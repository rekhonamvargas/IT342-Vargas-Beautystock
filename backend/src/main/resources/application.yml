spring:
  application:
    name: beautystock-api
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://ep-jolly-mud-a1s7m4ju-pooler.ap-southeast-1.aws.neon.tech/IT342-Vargas-Beautystock?user=neondb_owner&password=npg_3d1TStbRYlwo&sslmode=require&channelBinding=require
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      data-source-properties:
        sslmode: require
  flyway:
    locations: classpath:db/migration
    outOfOrder: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  cache:
    type: simple
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:rekhonavargas04@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/login/oauth2/code/google}
        provider:
          google:
            issuer-uri: https://accounts.google.com
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
            user-name-attribute: email

app:
  oauth2:
    redirect-success-url: ${OAUTH2_REDIRECT_SUCCESS_URL:http://localhost:3000/oauth2/callback}
    redirect-failure-url: ${OAUTH2_REDIRECT_FAILURE_URL:http://localhost:3000/login}

jwt:
  secret: ${JWT_SECRET:your-secret-key-at-least-32-characters-long-change-this-in-production-12345}
  expiration: 86400000
  refresh-expiration: 604800000



server:
  servlet:
    context-path: /api
  port: 8080

logging:
  level:
    root: INFO
    com.beautystock: DEBUG
    org.springframework.security: DEBUG
